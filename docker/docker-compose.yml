services:

  alzheicare-ai:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: alzheicare-ai
    ports:
      - "8000:8000"         
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - APP_ENV=${APP_ENV:-development}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - alzheicare-internal
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; httpx.get('http://localhost:8000/health/ping').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    container_name: alzheicare-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
        
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - alzheicare-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:

networks:
  alzheicare-internal:
    driver: bridge